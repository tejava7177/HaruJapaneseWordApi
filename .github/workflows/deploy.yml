name: Deploy to EC2

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Build boot jar
        run: |
          echo "Building Spring Boot jar with Gradle..."
          ./gradlew bootJar --no-daemon
          echo "Build completed."

      - name: Deploy on EC2 over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script_stop: true
          command_timeout: 30m
          script: |
            set -Eeuo pipefail

            echo "[1/13] cd ~/HaruJapaneseWordApi"
            cd ~/HaruJapaneseWordApi

            echo "[2/13] git fetch"
            git fetch

            echo "[3/13] git checkout main"
            git checkout main

            echo "[4/13] git pull origin main"
            git pull origin main

            echo "[5/13] chmod +x ./gradlew"
            chmod +x ./gradlew

            echo "[6/13] docker-compose down"
            docker-compose down

            echo "[7/13] rm -f build/libs/app.jar"
            rm -f build/libs/app.jar

            echo "[8/13] ./gradlew clean bootJar"
            ./gradlew clean bootJar

            echo "[9/13] docker-compose build --no-cache"
            docker-compose build --no-cache

            echo "[10/13] docker-compose up -d"
            docker-compose up -d

            echo "[11/13] docker-compose ps"
            docker-compose ps

            echo "[12/13] docker-compose logs --tail=200 haru-api || true"
            docker-compose logs --tail=200 haru-api || true

            echo "[13/13] wait for health check"
            for i in {1..18}; do
            if curl -fsS http://localhost:8080/actuator/health; then
            echo "Health check passed."
            exit 0
            fi
            echo "Health check failed, retrying in 10s... ($i/18)"
            sleep 10
            done
            
            echo "Health check did not pass in time."
            docker-compose ps || true
            docker-compose logs --tail=300 haru-api || true
            exit 1