server:
  port: 8080

app:
  seed:
    buddies: false

spring:
  application:
    name: haru-api

  datasource:
    url: jdbc:mysql://localhost:3306/haru
    username: root
    password: root1234

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  logging:
    level:
      org.springframework.web.servlet.mvc.method.annotation.RequestMappingHandlerMapping: TRACE
