server:
  port: 8080
  error:
    include-message: never

app:
  seed:
    users: false
    buddies: false

spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

apns:
  enabled: ${APNS_ENABLED:false}
  key-id: ${APNS_KEY_ID}
  team-id: ${APNS_TEAM_ID}
  bundle-id: ${APNS_BUNDLE_ID}
  private-key-path: ${APNS_PRIVATE_KEY_PATH}
  use-sandbox: ${APNS_USE_SANDBOX:false}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never